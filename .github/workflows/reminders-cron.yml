name: Reminders sweep

# Vercel's own Cron (Hobby plan) can only run once a day with up to ~59min
# of jitter — not precise enough for "remind me at a specific time". This
# workflow hits the sweep endpoint every 5 minutes instead, at no cost.
# (GitHub Actions' schedule floor is 5 minutes — can't go tighter than this.)
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminders sweep endpoint
        run: |
          curl -sS -f -X GET "${APP_URL}/api/cron/reminders" \
            -H "Authorization: Bearer ${CRON_SECRET}"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
